<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomikRyo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

.cover{
width:100%;
height:350px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.genre{
display:inline-block;
background:#222;
padding:6px 12px;
border-radius:20px;
font-size:14px;
}

.chapter-list{
padding:15px;
}

.chapter{
background:#1b1b1b;
padding:15px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.chapter:hover{
background:#252525;
}
</style>
</head>
<body>

<img id="cover" class="cover">

<div class="info">

<div id="title" class="title"></div>

<div id="genre" class="genre"></div>

</div>

<div class="chapter-list" id="chapters">

Loading...

</div>

<script>

const SUPABASE_URL =
"URL_SUPABASE_KAMU";

const SUPABASE_KEY =
"PUBLISHABLE_KEY_KAMU";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const mangaId =
localStorage.getItem(
"selectedMangaId"
);

async function loadManga(){

const { data:manga } =
await supabaseClient
.from("manga")
.select("*")
.eq("id", mangaId)
.single();

document.getElementById("title").innerText =
manga.title;

document.getElementById("genre").innerText =
manga.genre;

document.getElementById("cover").src =
manga.cover;

const { data:chapters } =
await supabaseClient
.from("chapters")
.select("*")
.eq("manga_id", mangaId);

renderChapters(chapters);

}

function renderChapters(chapters){

let box =
document.getElementById("chapters");

box.innerHTML = "";

if(chapters.length===0){

box.innerHTML =
"Tidak ada chapter";

return;

}

chapters.forEach(ch=>{

box.innerHTML += `

<div
class="chapter"
onclick="openChapter('${ch.chapter}')">

📖 Chapter ${ch.chapter}

</div>

`;

});

}

function openChapter(chapter){

localStorage.setItem(
"selectedChapter",
chapter
);

window.location.href =
"reader.html";

}

loadManga();

</script>

</body>
</html>
