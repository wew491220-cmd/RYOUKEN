<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Komik</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
padding:15px;
}

img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2 id="title"></h2>
<img id="cover">
<p id="genre"></p>

<button onclick="read()">📖 Baca Komik</button>

<script>
let data = [];
let index = localStorage.getItem("selectedManga");

fetch("data.json")
.then(res => res.json())
.then(json => {
data = json;

let manga = data[index];

document.getElementById("title").innerText = manga.title;
document.getElementById("cover").src = manga.img;
document.getElementById("genre").innerText = manga.genre;
});

function read(){
window.location.href = "reader.html";
}
</script>

</body>
</html>
