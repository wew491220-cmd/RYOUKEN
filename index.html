<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomikRyo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
}

header{
background:#1b1b1b;
padding:15px;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.genre-bar{
display:flex;
gap:8px;
overflow-x:auto;
padding:15px;
}

.genre-bar button{
border:none;
padding:8px 14px;
border-radius:20px;
background:#222;
color:white;
white-space:nowrap;
cursor:pointer;
}

.genre-bar button.active{
background:#4caf50;
}

.section-title{
padding:0 15px;
font-size:20px;
margin-top:10px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1b1b1b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-info{
padding:10px;
}

.card h3{
font-size:14px;
margin-bottom:5px;
}

.card p{
font-size:12px;
color:#aaa;
}

.loading{
text-align:center;
padding:30px;
}

::-webkit-scrollbar{
display:none;
}
</style>
</head>
<body>

<header>

<div class="logo">
📚 KomikRyo
</div>

<input
type="text"
class="search"
id="search"
placeholder="Cari manga..."
oninput="filterManga()">

</header>

<div class="genre-bar">

<button class="active" onclick="setGenre('All',this)">
All
</button>

<button onclick="setGenre('Action',this)">Action</button>
<button onclick="setGenre('Adventure',this)">Adventure</button>
<button onclick="setGenre('Comedy',this)">Comedy</button>
<button onclick="setGenre('Drama',this)">Drama</button>
<button onclick="setGenre('Fantasy',this)">Fantasy</button>
<button onclick="setGenre('Isekai',this)">Isekai</button>
<button onclick="setGenre('Romance',this)">Romance</button>
<button onclick="setGenre('School Life',this)">School Life</button>
<button onclick="setGenre('Sci-Fi',this)">Sci-Fi</button>
<button onclick="setGenre('Shounen',this)">Shounen</button>

</div>

<h2 class="section-title">
🔥 Trending Manga
</h2>

<div class="grid" id="list">

<div class="loading">
Loading...
</div>

</div>

<script>

const SUPABASE_URL =
"https://sqjyywohnrxgvdbgdtns.supabase.co";

const SUPABASE_KEY =
"sb_publishable_KY1cmP5Q-KDfiV5MVkuzsw_gNvxe1_c";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let allManga = [];
let currentGenre = "All";

async function loadManga(){

const { data, error } =
await supabaseClient
.from("manga")
.select("*")
.order("id",{ascending:false});

if(error){
console.log(error);
return;
}

allManga = data;

render(allManga);

}

function render(data){

let list =
document.getElementById("list");

list.innerHTML = "";

if(data.length === 0){

list.innerHTML =
"<div class='loading'>Tidak ada manga</div>";

return;

}

data.forEach(item=>{

list.innerHTML += `

<div
class="card"
onclick="openManga(${item.id})">

<img src="${item.cover}">

<div class="card-info">

<h3>${item.title}</h3>

<p>${item.genre}</p>

</div>

</div>

`;

});

}

function filterManga(){

let keyword =
document
.getElementById("search")
.value
.toLowerCase();

let filtered =
allManga.filter(m=>{

let genreMatch =
currentGenre === "All" ||
m.genre === currentGenre;

let titleMatch =
m.title
.toLowerCase()
.includes(keyword);

return genreMatch &&
titleMatch;

});

render(filtered);

}

function setGenre(
genre,
btn
){

currentGenre = genre;

document
.querySelectorAll(".genre-bar button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

filterManga();

}

function openManga(id){

localStorage.setItem(
"selectedMangaId",
id
);

window.location.href =
"manga.html";

}

loadManga();

</script>

</body>
  </html>
