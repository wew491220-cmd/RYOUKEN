<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomikRyo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
padding:15px;
background:#1b1b1b;
font-size:20px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:14px;
}

.card p{
margin:10px;
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<header>📚 KomikRyo</header>

<div class="grid" id="list"></div>

<script>
let data = [];

fetch("data.json")
.then(res => res.json())
.then(json => {
data = json;
render();
});

function render(){
let list = document.getElementById("list");
list.innerHTML = "";

data.forEach((item, i) => {
list.innerHTML += `
<div class="card" onclick="openManga(${i})">
<img src="${item.img}">
<h3>${item.title}</h3>
<p>${item.genre}</p>
</div>
`;
});
}

function openManga(i){
localStorage.setItem("selectedManga", i);
window.location.href = "manga.html";
}
</script>

</body>
</html>
