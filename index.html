<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomikRyo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#1b1b1b;
padding:15px;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.section{
padding:15px;
}

.section-title{
margin-bottom:15px;
padding-left:10px;
border-left:4px solid #4caf50;
}

.genre-list{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.genre{
background:#222;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
color:white;
}

.genre:hover{
background:#4caf50;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
}

.card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-info{
padding:10px;
}

.card-info span{
color:#aaa;
font-size:12px;
}

footer{
text-align:center;
padding:20px;
color:#888;
}
</style>
</head>

<body>

<header>
<div class="logo">📚 KomikKu</div>

<div class="search">
<input type="text" id="search" placeholder="Cari manga/manhwa..." onkeyup="searchComic()">
</div>
</header>

<section class="section">
<h2 class="section-title">Populer Hari Ini</h2>

<div class="grid"></div>

</section>

<footer>
© 2026 KomikKu
</footer>

<script>
// ambil data dari admin
let comics = JSON.parse(localStorage.getItem("komik")) || [];

// render komik
function render(){
let grid = document.querySelector(".grid");
grid.innerHTML = "";

if(comics.length === 0){
grid.innerHTML = "<p style='color:#aaa'>Belum ada komik diupload</p>";
return;
}

comics.forEach((c, i)=>{
grid.innerHTML += `
<div class="card" onclick="openManga(${i})">
<img src="${c.img}">
<div class="card-info">
<h4>${c.title}</h4>
<span>${c.genre} - ${c.chapter}</span>
</div>
</div>
`;
});
}

// buka manga.html
function openManga(i){
localStorage.setItem("selectedManga", i);
window.location.href = "manga.html";
}

// search
function searchComic(){
let val = document.getElementById("search").value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let title = card.querySelector("h4").innerText.toLowerCase();
card.style.display = title.includes(val) ? "block" : "none";
});
}

render();
</script>

</body>
</html>
