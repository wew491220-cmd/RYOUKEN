<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomikRyo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
padding:15px;
background:#1b1b1b;
font-size:20px;
font-weight:bold;
text-align:center;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#222;
color:white;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:14px;
}

.card p{
margin:10px;
font-size:12px;
color:#aaa;
}

.loading{
text-align:center;
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<header>📚 KomikRyo</header>

<div class="search">
<input id="search" type="text" placeholder="Cari komik...">
</div>

<div id="list" class="grid">
<div class="loading">Loading komik...</div>
</div>

<script>
let allData = [];

// LOAD DATA
fetch("data.json")
.then(res => res.json())
.then(data => {
allData = data;
render(allData);
})
.catch(err => {
document.getElementById("list").innerHTML =
"<p class='loading'>Gagal load data.json</p>";
console.log(err);
});

// RENDER FUNCTION
function render(data){
let list = document.getElementById("list");
list.innerHTML = "";

if(data.length === 0){
list.innerHTML = "<p class='loading'>Tidak ada komik</p>";
return;
}

data.forEach((item, i) => {
list.innerHTML += `
<div class="card" onclick="openManga(${i})">
<img src="${item.img}">
<h3>${item.title}</h3>
<p>${item.genre}</p>
</div>
`;
});
}

// SEARCH
document.getElementById("search").addEventListener("input", function(){
let keyword = this.value.toLowerCase();

let filtered = allData.filter(item =>
item.title.toLowerCase().includes(keyword)
);

render(filtered);
});

// OPEN MANGA
function openManga(i){
localStorage.setItem("selectedManga", i);
window.location.href = "manga.html";
}
</script>

</body>
</html>
