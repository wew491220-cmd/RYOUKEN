<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomikRyo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
padding:15px;
background:#1b1b1b;
font-size:20px;
font-weight:bold;
text-align:center;
}

.search{
padding:10px 15px;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#222;
color:white;
outline:none;
}

.tags{
display:flex;
gap:8px;
flex-wrap:wrap;
padding:10px 15px;
}

.tag{
padding:6px 12px;
background:#222;
border-radius:20px;
font-size:12px;
cursor:pointer;
}

.tag.active{
background:#4caf50;
}

.section-title{
padding:10px 15px;
font-weight:bold;
color:#aaa;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:14px;
}

.card p{
margin:10px;
font-size:12px;
color:#aaa;
}

.badge{
position:absolute;
background:red;
color:white;
font-size:10px;
padding:3px 6px;
border-radius:5px;
margin:5px;
}
</style>
</head>

<body>

<header>📚 KomikRyo</header>

<div class="search">
<input id="search" type="text" placeholder="Cari komik...">
</div>

<div class="tags" id="genreTags"></div>

<div class="section-title">🔥 Trending Hari Ini</div>
<div id="trending" class="grid"></div>

<div class="section-title">📖 Semua Komik</div>
<div id="list" class="grid"></div>

<script>
let allData = [];
let currentGenre = "all";

// LOAD DATA
fetch("data.json")
.then(res => res.json())
.then(data => {
allData = data;
render();
});

// RENDER ALL
function render(){
renderTrending();
renderList();
renderGenres();
}

// TRENDING (auto random / simulasi populer)
function renderTrending(){
let trending = [...allData]
.sort(() => 0.5 - Math.random())
.slice(0, 4);

let box = document.getElementById("trending");
box.innerHTML = "";

trending.forEach(item => {
box.innerHTML += `
<div class="card" onclick="openManga('${item.title}')">
<img src="${item.img}">
<h3>${item.title}</h3>
<p>${item.genre}</p>
</div>
`;
});
}

// LIST + FILTER
function renderList(){
let box = document.getElementById("list");
box.innerHTML = "";

let filtered = allData.filter(item => {
let matchGenre = currentGenre === "all" || item.genre === currentGenre;
return matchGenre;
});

filtered.forEach(item => {
box.innerHTML += `
<div class="card" onclick="openManga('${item.title}')">
<img src="${item.img}">
<h3>${item.title}</h3>
<p>${item.genre}</p>
</div>
`;
});
}

// GENRE BUTTONS
function renderGenres(){
let genres = ["all", ...new Set(allData.map(x => x.genre))];

let box = document.getElementById("genreTags");
box.innerHTML = "";

genres.forEach(g => {
box.innerHTML += `
<div class="tag ${currentGenre===g?'active':''}" onclick="setGenre('${g}')">
${g}
</div>
`;
});
}

function setGenre(g){
currentGenre = g;
render();
}

// SEARCH
document.getElementById("search").addEventListener("input", function(){
let keyword = this.value.toLowerCase();

let filtered = allData.filter(item =>
item.title.toLowerCase().includes(keyword)
);

document.getElementById("list").innerHTML = "";

filtered.forEach(item => {
document.getElementById("list").innerHTML += `
<div class="card" onclick="openManga('${item.title}')">
<img src="${item.img}">
<h3>${item.title}</h3>
<p>${item.genre}</p>
</div>
`;
});
});

// OPEN MANGA
function openManga(title){
let index = allData.findIndex(x => x.title === title);
localStorage.setItem("selectedManga", index);
window.location.href = "manga.html";
}
</script>

</body>
</html>
