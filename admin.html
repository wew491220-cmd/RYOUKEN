<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin KomikRyo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
padding:20px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#262626;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.preview img{
width:80px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.manga{
display:flex;
gap:10px;
background:#222;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.manga img{
width:80px;
height:110px;
object-fit:cover;
border-radius:10px;
}

.status{
margin-top:10px;
font-size:14px;
}
</style>
</head>
<body>

<h1>📚 Admin KomikRyo</h1>

<div class="card">

<input type="text" id="title" placeholder="Judul Manga">

<select id="genre">
<option>Action</option>
<option>Adventure</option>
<option>Comedy</option>
<option>Drama</option>
<option>Fantasy</option>
<option>Isekai</option>
<option>Magic</option>
<option>Martial Arts</option>
<option>Mystery</option>
<option>Psychological</option>
<option>Romance</option>
<option>School Life</option>
<option>Sci-Fi</option>
<option>Shounen</option>
<option>Slice of Life</option>
<option>Supernatural</option>
<option>Tragedy</option>
</select>

<input type="text" id="chapter" placeholder="Chapter">

<label>Cover Manga</label>
<input type="file" id="cover" accept="image/*">

<label>Halaman Chapter</label>
<input type="file" id="pages" accept="image/*" multiple>

<div class="preview" id="preview"></div>

<button onclick="uploadManga()">
Upload Manga
</button>

<div class="status" id="status"></div>

</div>

<h2>Daftar Manga</h2>

<div id="list"></div>

<script>

const SUPABASE_URL = "https://sqjyywohnrxgvdbgdtns.supabase.co";
const SUPABASE_KEY = "sb_publishable_KY1cmP5Q-KDfiV5MVkuzsw_gNvxe1_c";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("pages")
.addEventListener("change",function(e){

let preview =
document.getElementById("preview");

preview.innerHTML = "";

[...e.target.files].forEach(file=>{

let reader = new FileReader();

reader.onload = function(x){

preview.innerHTML += `
<img src="${x.target.result}">
`;

}

reader.readAsDataURL(file);

});

});

async function uploadManga(){

const title =
document.getElementById("title").value;

const genre =
document.getElementById("genre").value;

const chapter =
document.getElementById("chapter").value;

const cover =
document.getElementById("cover").files[0];

const pages =
document.getElementById("pages").files;

if(
!title ||
!chapter ||
!cover ||
pages.length === 0
){
alert("Lengkapi data");
return;
}

const status =
document.getElementById("status");

status.innerHTML =
"Uploading...";

try{

const coverName =
"cover_" +
Date.now() +
"_" +
cover.name;

await supabaseClient
.storage
.from("manga")
.upload(
coverName,
cover
);

const coverUrl =
supabaseClient
.storage
.from("manga")
.getPublicUrl(
coverName
)
.data.publicUrl;

const mangaResult =
await supabaseClient
.from("manga")
.insert([
{
title,
genre,
cover:coverUrl
}
])
.select();

const mangaId =
mangaResult.data[0].id;

let pageUrls = [];

for(const file of pages){

const fileName =
"page_" +
Date.now() +
"_" +
file.name;

await supabaseClient
.storage
.from("manga")
.upload(
fileName,
file
);

const url =
supabaseClient
.storage
.from("manga")
.getPublicUrl(
fileName
)
.data.publicUrl;

pageUrls.push(url);

}

await supabaseClient
.from("chapters")
.insert([
{
manga_id:mangaId,
chapter:chapter,
pages:pageUrls
}
]);

status.innerHTML =
"✅ Upload berhasil";

loadManga();

}catch(err){

console.log(err);

status.innerHTML =
"❌ " + err.message;

}

}

async function loadManga(){

const list =
document.getElementById("list");

list.innerHTML = "";

const { data } =
await supabaseClient
.from("manga")
.select("*")
.order("id");

if(!data) return;

data.forEach(m=>{

list.innerHTML += `
<div class="manga">

<img src="${m.cover}">

<div>

<b>${m.title}</b><br>

${m.genre}

</div>

</div>
`;

});

}

loadManga();

</script>

</body>
  </html>
