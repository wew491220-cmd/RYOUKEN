<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader Komik</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

img{
max-width:100%;
max-height:90vh;
}

.controls{
position:fixed;
bottom:20px;
display:flex;
gap:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<img id="img">

<div class="controls">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
</div>

<script>
let data = [];
let index = localStorage.getItem("selectedManga");
let current = 0;

fetch("data.json")
.then(res => res.json())
.then(json => {
data = json;
show();
});

function show(){
let pages = data[index].pages;
document.getElementById("img").src = pages[current];
}

function next(){
let pages = data[index].pages;
if(current < pages.length - 1){
current++;
show();
}
}

function prev(){
if(current > 0){
current--;
show();
}
}
</script>

</body>
</html>
