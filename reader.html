<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader KomikRyo</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
font-family:Arial;
}

img{
max-width:100%;
max-height:90vh;
display:none;
}

.controls{
position:fixed;
bottom:20px;
display:flex;
gap:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
font-weight:bold;
cursor:pointer;
}

#error{
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<div id="error">Loading...</div>

<img id="page">

<div class="controls">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
</div>

<script>
// ambil data
let comics = JSON.parse(localStorage.getItem("komik")) || [];
let index = localStorage.getItem("selectedManga");

// validasi data utama
if(index === null || !comics[index]){
document.getElementById("error").innerText = "Komik tidak ditemukan";
throw new Error("no manga");
}

let data = comics[index];
let pages = data.pages || [];

// validasi halaman
if(pages.length === 0){
document.getElementById("error").innerText = "Halaman komik kosong";
throw new Error("no pages");
}

// UI
let img = document.getElementById("page");
let error = document.getElementById("error");

error.style.display = "none";
img.style.display = "block";

let current = 0;

function show(){
img.src = pages[current];
}

function next(){
if(current < pages.length - 1){
current++;
show();
}
}

function prev(){
if(current > 0){
current--;
show();
}
}

// start
show();
</script>

</body>
</html>
