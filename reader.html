<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader KomikRyo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
}

.topbar{
position:sticky;
top:0;
background:#111;
padding:12px;
text-align:center;
font-weight:bold;
z-index:10;
}

.reader{
max-width:900px;
margin:auto;
}

.reader img{
width:100%;
display:block;
}

.loading{
text-align:center;
padding:30px;
}
</style>
</head>
<body>

<div class="topbar" id="chapterTitle">
Loading...
</div>

<div class="reader" id="reader">
<div class="loading">
Memuat chapter...
</div>
</div>

<script>

const SUPABASE_URL =
"URL_SUPABASE_KAMU";

const SUPABASE_KEY =
"PUBLISHABLE_KEY_KAMU";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const mangaId =
localStorage.getItem(
"selectedMangaId"
);

const chapter =
localStorage.getItem(
"selectedChapter"
);

async function loadChapter(){

const { data,error } =
await supabaseClient
.from("chapters")
.select("*")
.eq("manga_id", mangaId)
.eq("chapter", chapter)
.single();

if(error){

document.getElementById("reader")
.innerHTML =
"Gagal memuat chapter";

return;

}

document.getElementById(
"chapterTitle"
).innerText =
"Chapter " + chapter;

let html = "";

data.pages.forEach(page=>{

html += `
<img src="${page}">
`;

});

document.getElementById(
"reader"
).innerHTML = html;

}

loadChapter();

</script>

</body>
</html>
